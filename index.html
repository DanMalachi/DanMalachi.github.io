<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>דשבורד מניות אישי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&family=Noto+Sans+Hebrew:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --bg:        #f5f4f0;
      --surface:   #ffffff;
      --surface2:  #f0efe9;
      --border:    rgba(0,0,0,0.09);
      --border2:   rgba(0,0,0,0.15);
      --text:      #1a1a18;
      --text2:     #6b6a64;
      --text3:     #9d9c96;
      --accent:    #1a4fbd;
      --accent-bg: #e8eef9;
      --green:     #0f6e56;
      --green-bg:  #e1f5ee;
      --red:       #993c1d;
      --red-bg:    #faece7;
      --amber:     #854f0b;
      --amber-bg:  #faeeda;
      --purple:    #3c3489;
      --purple-bg: #eeedfe;
      --radius:    10px;
      --radius-lg: 14px;
      --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #0f0f0d;
        --surface:   #1a1a17;
        --surface2:  #222220;
        --border:    rgba(255,255,255,0.08);
        --border2:   rgba(255,255,255,0.14);
        --text:      #f0efe8;
        --text2:     #9a9890;
        --text3:     #65645e;
        --accent:    #5b82e8;
        --accent-bg: #1a2340;
        --green:     #5dcaa5;
        --green-bg:  #04342c;
        --red:       #f0997b;
        --red-bg:    #4a1b0c;
        --amber:     #ef9f27;
        --amber-bg:  #412402;
        --purple:    #afa9ec;
        --purple-bg: #26215c;
        --shadow:    0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', 'Noto Sans Hebrew', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 220px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .logo-mark {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .sidebar-logo .logo-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }
    .sidebar-nav { flex: 1; padding: 12px 10px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text2);
      font-size: 13.5px;
      font-weight: 400;
      transition: all .15s;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: right;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 500; }
    .nav-item i { font-size: 17px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 11.5px;
      color: var(--text3);
    }
    .api-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .api-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
    }
    .api-dot.live { background: var(--green); }
    .api-dot.error { background: var(--red); }

    /* ── Main ── */
    .main {
      margin-right: 220px;
      min-height: 100vh;
      padding: 28px 28px 40px;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }
    .page-title { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
    .page-subtitle { font-size: 12.5px; color: var(--text3); margin-top: 3px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      transition: all .15s;
      font-family: inherit;
    }
    .btn:hover { background: var(--surface2); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* ── Metric Cards ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 22px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
      box-shadow: var(--shadow);
      transition: transform .15s;
    }
    .metric-card:hover { transform: translateY(-1px); }
    .metric-label {
      font-size: 11.5px;
      color: var(--text3);
      font-weight: 400;
      letter-spacing: .03em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .metric-change {
      font-size: 12px;
      margin-top: 4px;
    }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .muted { color: var(--text3); }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 10px 18px;
      font-size: 13.5px;
      font-weight: 400;
      color: var(--text2);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      font-family: inherit;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    /* ── Stock Rows ── */
    .stock-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .stock-row:last-child { border-bottom: none; }
    .ticker {
      font-weight: 600;
      font-size: 14px;
      color: var(--accent);
      min-width: 52px;
    }
    .co-name { font-size: 13px; color: var(--text2); flex: 1; }
    .badge {
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 5px;
    }
    .badge-hot    { background: var(--red-bg);    color: var(--red); }
    .badge-val    { background: var(--green-bg);  color: var(--green); }
    .badge-social { background: var(--purple-bg); color: var(--purple); }
    .badge-news   { background: var(--accent-bg); color: var(--accent); }
    .badge-warn   { background: var(--amber-bg);  color: var(--amber); }
    .stock-price  { font-size: 13.5px; font-weight: 500; min-width: 64px; text-align: left; }
    .stock-chg    { font-size: 13px; min-width: 52px; text-align: left; }

    /* ── Holdings Table ── */
    .holdings-table {
      width: 100%;
      border-collapse: collapse;
    }
    .holdings-table th {
      font-size: 11px;
      color: var(--text3);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 0 12px 10px 0;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .holdings-table th:last-child { text-align: left; }
    .holdings-table td {
      padding: 11px 12px 11px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
      vertical-align: middle;
    }
    .holdings-table tr:last-child td { border-bottom: none; }
    .holdings-table td:last-child { text-align: left; }

    /* ── Sector bars ── */
    .sector-row { margin-bottom: 14px; }
    .sector-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 5px;
    }
    .sector-track {
      height: 7px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .sector-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

    /* ── Signals ── */
    .signal-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .signal-row:last-child { border-bottom: none; }
    .signal-src {
      font-size: 10.5px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 5px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .signal-text { font-size: 13px; flex: 1; line-height: 1.5; }
    .signal-time { font-size: 11px; color: var(--text3); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
    .tck { font-weight: 600; color: var(--accent); }

    /* ── Risk Bars ── */
    .risk-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
      font-size: 12.5px;
    }
    .risk-label { min-width: 110px; color: var(--text2); }
    .risk-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; }
    .risk-fill { height: 6px; border-radius: 3px; }
    .risk-tag { font-size: 11px; font-weight: 500; min-width: 38px; text-align: left; }

    /* ── Settings ── */
    .settings-section { margin-bottom: 22px; }
    .settings-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12.5px; color: var(--text2); margin-bottom: 5px; display: block; }
    .form-input {
      width: 100%;
      padding: 9px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13.5px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text3); }
    .ticker-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .ticker-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      cursor: pointer;
    }
    .ticker-tag .remove {
      font-size: 14px;
      line-height: 1;
      color: var(--accent);
      opacity: 0.6;
    }
    .ticker-tag .remove:hover { opacity: 1; }

    /* ── Alert box ── */
    .alert {
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 12.5px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-top: 10px;
    }
    .alert-warn { background: var(--amber-bg); color: var(--amber); }
    .alert-info { background: var(--accent-bg); color: var(--accent); }
    .alert-success { background: var(--green-bg); color: var(--green); }

    /* ── Loading ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-right: 0; padding: 16px; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col, .three-col { grid-template-columns: 1fr; }
    }

    /* ── Animations ── */
    .fade-in { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ── Chart canvas wrapper ── */
    .chart-wrap { position: relative; width: 100%; height: 220px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  </style>
</head>

    <div class="sidebar-logo">
      <div class="logo-mark">📈 StockIL</div>
      <div class="logo-sub">דשבורד מניות אישי</div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showTab('opportunities', this)">
        <i class="ti ti-flame"></i> הזדמנויות
      </button>
      <button class="nav-item" onclick="showTab('portfolio', this)">
        <i class="ti ti-briefcase"></i> תיק שלי
      </button>
